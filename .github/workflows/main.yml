name: build

on:
  workflow_dispatch:
  push:
    branches: [ main ]

permissions:
  contents: write   # REQUIRED to create GitHub releases

jobs:
  build:
    runs-on: ubuntu-24.04

    steps:
      # -----------------------------
      # Checkout
      # -----------------------------
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # REQUIRED for git tags & changelog

      # -----------------------------
      # Java
      # -----------------------------
      - name: Setup JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      # -----------------------------
      # Build with Maven
      # -----------------------------
      - name: Build with Maven
        run: mvn -B clean package --file pom.xml

      # -----------------------------
      # Get build number and rename JAR
      # -----------------------------
      - name: Get build number and rename JAR
        id: build_number
        run: |
          # Get the highest existing build number from tags
          LAST_NUM=$(git ls-remote --tags origin | grep -o 'v[0-9]*' | sed 's/v//' | sort -n | tail -n1)
          if [ -z "$LAST_NUM" ]; then
            NEXT_NUM=1
          else
            NEXT_NUM=$((LAST_NUM + 1))
          fi
          echo "next_number=$NEXT_NUM" >> $GITHUB_OUTPUT
          
          # Find the actual JAR file (exclude original-* files)
          ORIGINAL_JAR=$(ls target/*.jar 2>/dev/null | grep -v 'original-' | head -n1)
          
          if [ -z "$ORIGINAL_JAR" ] || [ ! -f "$ORIGINAL_JAR" ]; then
            echo "❌ ERROR: Original JAR not found"
            ls -la target/
            exit 1
          fi
          
          # Rename with build number
          NEW_JAR="target/test-${NEXT_NUM}.jar"
          mv "$ORIGINAL_JAR" "$NEW_JAR"
          echo "JAR_FILE=$NEW_JAR" >> "$GITHUB_ENV"
          echo "JAR_NAME=caesium-${NEXT_NUM}.jar" >> "$GITHUB_ENV"
          echo "✅ Renamed to: test-${NEXT_NUM}.jar"

      # -----------------------------
      # Generate changelog (since last tag)
      # -----------------------------
      - name: Generate changelog
        run: |
          LAST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          echo "## Changes" > CHANGELOG.md

          if [ -z "$LAST_TAG" ]; then
            echo "_Initial release_" >> CHANGELOG.md
            echo "" >> CHANGELOG.md
            git log --pretty=format:"- %s (%h)" >> CHANGELOG.md
          else
            echo "_Changes since $LAST_TAG_" >> CHANGELOG.md
            echo "" >> CHANGELOG.md
            git log $LAST_TAG..HEAD --pretty=format:"- %s (%h)" >> CHANGELOG.md
          fi

      # -----------------------------
      # GitHub Release
      # -----------------------------
      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ env.JAR_FILE }}
          tag_name: v${{ steps.build_number.outputs.next_number }}
          name: Test New Build ${{ steps.build_number.outputs.next_number }}
          body_path: CHANGELOG.md
          overwrite_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
